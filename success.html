<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud enviada · TuEscaparate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffffff; --text: #1a1a2e; --primary: #e8593b; --primary-hover: #d44a2e; --shadow: rgba(232,89,59,0.35); --text-secondary: #555; --text-light: #999; --card-border: #eee; --nav-bg: rgba(255,255,255,0.9); --nav-border: rgba(0,0,0,0.06); --bg-alt: #faf8fc; --toggle-bg: rgba(0,0,0,0.04); --toggle-border: rgba(0,0,0,0.08); --toggle-hover: rgba(0,0,0,0.08); }
    [data-theme="dark"] { --bg: #181b2a; --text: #e0e0e8; --text-secondary: #b0a8c0; --text-light: #6a6a7a; --card-border: #2f3448; --nav-bg: rgba(24,27,42,0.92); --nav-border: rgba(255,255,255,0.06); --bg-alt: #1f2235; --toggle-bg: rgba(255,255,255,0.05); --toggle-border: rgba(255,255,255,0.08); --toggle-hover: rgba(255,255,255,0.1); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg);
      line-height: 1.6; transition: background 0.3s, color 0.3s;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 0 24px; }

    nav {
      padding: 16px 0; background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--nav-border);
      transition: background 0.3s, border-color 0.3s;
    }
    nav .container { max-width: 1100px; display: flex; align-items: center; justify-content: space-between; }
    .logo {
      font-weight: 800; font-size: 20px; color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .logo img { height: 28px; width: auto; display: block; }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 24px; text-align: center;
    }
    .card {
      background: var(--bg-alt); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 56px 40px; max-width: 480px; width: 100%;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .check { font-size: 64px; margin-bottom: 16px; animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    h1 .highlight { background: linear-gradient(135deg, #fbbf7c, #e8593b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { font-size: 16px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.6; }
    .service-badge {
      display: inline-block; background: var(--primary); color: #fff;
      padding: 6px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
      margin: 16px 0 24px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 16px; padding: 14px 28px;
      border-radius: 10px; text-decoration: none;
      background: var(--primary); color: #fff;
      box-shadow: 0 4px 20px var(--shadow);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-3px) scale(1.03); }
    .note { font-size: 13px; color: var(--text-light); margin-top: 20px; }

    footer { padding: 24px 0; text-align: center; font-size: 13px; color: var(--text-light); border-top: 1px solid var(--card-border); }
    @media (max-width: 600px) { .card { padding: 40px 24px; } }
  </style>
</head>
<body>
<nav>
  <div class="container">
    <a href="index.html" class="logo"><img src="logo.png" alt="TuEscaparate">TuEscaparate</a>
  </div>
</nav>

<main>
  <div class="card">
    <div class="check">✅</div>
    <h1>¡<span class="highlight">Solicitud enviada</span>!</h1>
    <p>Hemos recibido tu información.</p>
    <p style="margin-bottom: 4px;">Te escribimos en las próximas horas para darte los siguientes pasos.</p>
    <div class="service-badge" id="serviceBadge">Web gratis (Kit Digital)</div>
    <a href="index.html" class="btn">Volver a TuEscaparate</a>
    <p class="note">Sin spam. Solo te contactamos si podemos ayudarte.</p>
  </div>
</main>

<footer>TuEscaparate &mdash; Madrid &bull; 2026</footer>

<script>
  (function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches))
      document.documentElement.setAttribute('data-theme', 'dark');
    const params = new URLSearchParams(window.location.search);
    const service = params.get('s');
    const badge = document.getElementById('serviceBadge');
    const names = {
      web: 'Web gratis (Kit Digital)',
      google: 'Google Business (150€)',
      automation: 'Automatizaciones (desde 300€)',
      varios: 'Varios / No sé'
    };
    if (service && names[service]) badge.textContent = names[service];
  })();
</script>
</body>
</html>
