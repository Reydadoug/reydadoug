<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Recibido! — Reydadoug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(165deg, #1a1a2e 0%, #2d1f3d 40%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 480px; }
    .check {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(232,89,59,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    h1 { font-size: 34px; font-weight: 800; margin-bottom: 12px; }
    p { color: #b0a8c0; font-size: 17px; margin-bottom: 36px; line-height: 1.6; }
    a {
      display: inline-block;
      background: #e8593b; color: #fff;
      font-weight: 600; padding: 14px 32px;
      border-radius: 10px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(232,89,59,0.35);
    }
    a:hover { background: #d44a2e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>¡Recibido!</h1>
    <p>Te escribimos pronto para contarte cómo conseguimos tu web gratis con el Kit Digital.</p>
    <a href="/reydadoug/">Volver</a>
  </div>
</body>
</html>
