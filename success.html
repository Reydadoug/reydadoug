<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Gracias! · TuEscaparate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #ffffff; --text: #1a1a2e; --primary: #e8593b; --shadow: rgba(232,89,59,0.35); }
    [data-theme="dark"] { --bg: #181b2a; --text: #e0e0e8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg);
      line-height: 1.6; transition: background 0.3s, color 0.3s;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .container { max-width: 480px; padding: 0 24px; animation: fadeUp 0.5s ease 0.1s both; }
    h1 { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
    p { font-size: 16px; color: #777; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 16px; padding: 14px 28px;
      border-radius: 10px; text-decoration: none;
      background: var(--primary); color: #fff;
      box-shadow: 0 4px 20px var(--shadow);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn:hover { background: #d44a2e; transform: translateY(-3px) scale(1.03); }
  </style>
</head>
<body>
  <div class="container">
    <h1>¡Recibido!</h1>
    <p>Te escribimos en las próximas horas para contarte los siguientes pasos.</p>
    <a href="index.html" class="btn">Volver a TuEscaparate</a>
  </div>
  <script>
    (function() {
      if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</body>
</html>
