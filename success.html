<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Recibido! — Reydadoug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 480px; }
    .check { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
    p { color: #b0b0c8; font-size: 17px; margin-bottom: 32px; line-height: 1.6; }
    a {
      display: inline-block;
      background: #6c63ff;
      color: #fff;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
    }
    a:hover { background: #5a52e0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>¡Recibido!</h1>
    <p>Te escribo pronto para contarte cómo conseguimos tu web gratis con el Kit Digital.</p>
    <a href="/reydadoug/">Volver</a>
  </div>
</body>
</html>
